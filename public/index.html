<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Inteligente - ERP</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <i class="fas fa-boxes-stacked logo-icon"></i>
            <h1>Gestor <span>Inteligente</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-grid">
            <section class="card form-section">
                <div class="card-header">
                    <h2 id="titulo-formulario"><i class="fas fa-plus-circle"></i> Cadastrar Novo Produto</h2>
                </div>
                <form id="form-produto">
                    <input type="hidden" id="produto-id" value="">
                    
                    <div class="form-group">
                        <label for="nome">Nome do Produto</label>
                        <div class="input-container">
                            <i class="fas fa-tag"></i>
                            <input type="text" id="nome" required placeholder="Ex: Teclado Mecânico">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="qtd">Quantidade</label>
                            <div class="input-container">
                                <i class="fas fa-list-numeric"></i>
                                <input type="number" id="qtd" min="0" required placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="preco">Preço Unitário (R$)</label>
                            <div class="input-container">
                                <i class="fas fa-dollar-sign"></i>
                                <input type="number" id="preco" step="0.01" min="0" required placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div id="form-actions">
                        <button type="submit" id="btn-salvar" class="btn-primary">
                            <i class="fas fa-save"></i> <span>Adicionar ao Estoque</span>
                        </button>
                    </div>
                </form>
            </section>

            <section class="card table-section">
                <div class="card-header">
                    <h2><i class="fas fa-warehouse"></i> Estoque Atual</h2>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Qtd.</th>
                                <th>Preço</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos">
                            <!-- Os produtos serão inseridos aqui via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
